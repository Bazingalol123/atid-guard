    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>


    <!-- Fallback confirmation functions -->
    <script>
        window.showConfirmation = function (title, message, confirmText, cancelText, isDanger) {
            return new Promise((resolve) => {
                const result = confirm(message);
                resolve(result);
            });
        };

        // Add to wwwroot/js or in a <script> tag
        window.openInBackgroundTab = (url) => {
            const link = document.createElement('a');
            link.href = url;
            link.target = '_blank';
            link.rel = 'noopener noreferrer';

            // Simulate Ctrl+Click to open in background tab
            const event = new MouseEvent('click', {
                ctrlKey: true,    // For Windows/Linux
                metaKey: true,    // For Mac
                button: 0
            });

            link.dispatchEvent(event);
        };


        window.downloadFile = function (url) {
            const link = document.createElement('a');
            link.href = url;
            link.setAttribute('download', '');
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        };
    </script>

    <script>
        window.closeOffcanvas = () => {
            var offcanvasEl = document.getElementById('offcanvasMobileMenu');
            var bsOffcanvas = bootstrap.Offcanvas.getInstance(offcanvasEl);
            if (bsOffcanvas) {
                bsOffcanvas.hide();
            }
        };
    </script>
